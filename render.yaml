services:
  - type: web
    name: watchlist
    runtime: python
    pythonVersion: "3.13"
    buildCommand: >
      sh -c "cd backend && pip install -r requirements.txt" &&
      npm install -g pnpm &&
      cd frontend && pnpm install && pnpm ng build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
